<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cœur discret</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Fond crème très clair */
            background-color: #FEFDF5; 
            overflow: hidden;
        }

        svg {
            width: 40%;  /* Taille moyenne pour le cœur */
            max-width: 200px;
            height: auto;
        }

        #heart {
            /* Couleur crème légèrement plus soutenue pour le cœur (très discret) */
            fill: #E9E6D1;
            /* Pas de contour pour plus de discrétion, ou un contour très clair */
            stroke: none;
            /* Optionnel : légère transparence pour fondre encore plus */
            /* opacity: 0.8; */
        }

    </style>
</head>
<body>

    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        
        <path id="heart" d="M50,30 C50,30 45,20 35,20 C25,20 15,30 15,40 C15,60 50,80 50,80 C50,80 85,60 85,40 C85,30 75,20 65,20 C55,20 50,30 50,30 Z" />

    </svg>

</body>
</html>
